######################################################################
# environment and task
env_suite: robomimic
env: lift

# future action forecasts
action_dim: 7
horizon_steps: 4

# observation history
obs_dim: 9
cond_steps: 1
img_cond_steps: 1

# observation shape
shape_meta:
  obs:
    rgb:
      shape: [3, 96, 96]
    state:
      shape: [9]
  action:
    shape: [7]
###################################################################

defaults:
  - _self_
hydra:
  run:
    dir: ${logdir}
_target_: agent.pretrain.train_dmf_agent.TrainDecoupledMeanFlowAgent
name: ${env}_pre_dmf_mlp_img_ta${horizon_steps}_td${denoising_steps}
logdir: ${oc.env:REINFLOW_LOG_DIR}/robomimic/pretrain/${env}/${name}/${now:%Y-%m-%d}_${now:%H-%M-%S}_${seed}
train_dataset_path: ${oc.env:REINFLOW_DATA_DIR}/robomimic/${env}-img/train.npz

# Optional: set this to a trained ReFlow checkpoint to warm-start DMF.
base_policy_path:
resume_training_state: false
load_strict: false
load_optimizer: false

denoising_steps: 4
batch_size: 256
seed: 42
device: cuda:0
test_in_mujoco: false
max_n_episodes: -1
fallback_to_fm_loss: false

wandb:
  entity: ${oc.env:REINFLOW_WANDB_ENTITY}
  project: DM1-robomimic-${env}-pretrain
  run: ${now:%Y-%m-%d}_${now:%H-%M-%S}_${name}
  offline_mode: false

train:
  n_epochs: 2000
  batch_size: ${batch_size}
  learning_rate: 1e-4
  weight_decay: 1e-6
  lr_scheduler:
    first_cycle_steps: 2000
    warmup_steps: 100
    min_lr: 1e-5
  epoch_start_ema: 20
  update_ema_freq: 10
  save_model_freq: 100
  log_freq: 25

model:
  _target_: model.flow.dmf.DecoupledMeanFlow
  network:
    _target_: model.flow.mlp_dmf.DecoupledVisionFlowMLP
    backbone:
      _target_: model.common.vit.VitEncoder
      obs_shape: ${shape_meta.obs.rgb.shape}
      num_channel: ${eval:'${shape_meta.obs.rgb.shape[0]} * ${img_cond_steps}'}
      cfg:
        patch_size: 8
        depth: 1
        embed_dim: 128
        num_heads: 4
        embed_style: embed2
        embed_norm: 0
    img_cond_steps: ${img_cond_steps}
    augment: true
    spatial_emb: 128
    time_dim: 32
    mlp_dims: [512, 512, 512]
    residual_style: true
    cond_dim: ${eval:'${obs_dim} * ${cond_steps}'}
    horizon_steps: ${horizon_steps}
    action_dim: ${action_dim}
  device: ${device}
  horizon_steps: ${horizon_steps}
  action_dim: ${action_dim}
  act_min: -1
  act_max: 1
  obs_dim: ${obs_dim}
  max_denoising_steps: ${denoising_steps}
  seed: ${seed}
  sample_t_type: logitnormal
  P_mean: 0.0
  P_std: 1.0
  P_mean_t: 0.4
  P_std_t: 1.0
  P_mean_r: -1.2
  P_std_r: 1.0
  flow_loss_weight: 0.5
  meanflow_loss_weight: 0.5
  flow_ratio: 0.0
  loss_type: mse
  gamma: 0.5
  c: 1e-3
  sampling_shift: 1.0
  freeze_encoder: false

ema:
  decay: 0.995

train_dataset:
  _target_: agent.dataset.sequence.StitchedSequenceDataset
  use_img: true
  dataset_path: ${train_dataset_path}
  horizon_steps: ${horizon_steps}
  max_n_episodes: ${max_n_episodes}
  cond_steps: ${cond_steps}
  img_cond_steps: ${img_cond_steps}
  device: ${device}
